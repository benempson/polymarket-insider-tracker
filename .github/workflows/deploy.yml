name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      message:
        description: 'Trigger reason'
        required: false
        default: ''

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/polymarket-insider-tracker

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      # Derived from secrets — used throughout the job
      VM_APP_DIR: /home/${{ secrets.SERVER_USER }}/polymarket-insider-tracker
      SSH_TARGET: ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}

    steps:
      # -------------------------------------------------------------------
      # 1. Checkout
      # -------------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # -------------------------------------------------------------------
      # 2. Preflight — fail fast before Docker build
      # -------------------------------------------------------------------

      # 2a. Infrastructure secrets (SSH + GHCR)
      - name: Check required infrastructure secrets
        run: |
          MISSING=""
          [ -z "${{ secrets.SERVER_SSH_KEY }}" ] && MISSING="$MISSING SERVER_SSH_KEY"
          [ -z "${{ secrets.SERVER_HOST }}"    ] && MISSING="$MISSING SERVER_HOST"
          [ -z "${{ secrets.SERVER_PORT }}"    ] && MISSING="$MISSING SERVER_PORT"
          [ -z "${{ secrets.SERVER_USER }}"    ] && MISSING="$MISSING SERVER_USER"
          [ -z "${{ secrets.GHCR_PAT }}"       ] && MISSING="$MISSING GHCR_PAT"
          [ -z "${{ vars.REDIS_CONTAINER_NAME }}" ] && MISSING="$MISSING REDIS_CONTAINER_NAME(var)"
          if [ -n "$MISSING" ]; then
            echo "::error::Missing infrastructure secrets/variables:$MISSING"
            echo ""
            echo "These must be set in GitHub repo Settings > Secrets and variables > Actions:"
            echo "  SERVER_SSH_KEY        (secret)   — SSH private key for the deployment VM"
            echo "  SERVER_HOST           (secret)   — VM hostname"
            echo "  SERVER_PORT           (secret)   — VM SSH port"
            echo "  SERVER_USER           (secret)   — VM SSH user"
            echo "  GHCR_PAT             (secret)   — GitHub PAT with packages:read scope for docker pull on VM"
            echo "  REDIS_CONTAINER_NAME  (variable) — Name of the shared Redis container on the VM"
            exit 1
          fi
          echo "All infrastructure secrets/variables present."

      # 2b. Application secrets (used to generate .env.production on the VM)
      - name: Check required application secrets
        run: |
          MISSING=""
          [ -z "${{ secrets.TRACKER_POSTGRES_PASSWORD }}" ] && MISSING="$MISSING TRACKER_POSTGRES_PASSWORD"
          [ -z "${{ secrets.TRACKER_POLYGON_RPC_URL }}"   ] && MISSING="$MISSING TRACKER_POLYGON_RPC_URL"
          if [ -n "$MISSING" ]; then
            echo "::error::Missing application secrets:$MISSING"
            echo ""
            echo "These secrets must be set in GitHub repo Settings > Secrets and variables > Actions:"
            echo "  TRACKER_POSTGRES_PASSWORD       — Password for the tracker's PostgreSQL container"
            echo "  TRACKER_POLYGON_RPC_URL          — Polygon RPC endpoint (e.g. from Alchemy/Infura)"
            echo ""
            echo "Optional application secrets (alerts will be disabled if not set):"
            echo "  TRACKER_DISCORD_WEBHOOK_URL      — Discord webhook for alerts"
            echo "  TRACKER_TELEGRAM_BOT_TOKEN       — Telegram bot token for alerts"
            echo "  TRACKER_TELEGRAM_CHAT_ID         — Telegram chat ID for alerts"
            echo "  TRACKER_POLYGON_FALLBACK_RPC_URL — Fallback Polygon RPC endpoint"
            exit 1
          fi
          echo "All required application secrets present."

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

      - name: Add VM to known hosts
        run: |
          ssh-keyscan -p ${{ secrets.SERVER_PORT }} -H "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts

      # 2c. Generate .env.production from secrets and write to VM
      - name: Generate and deploy env file
        run: |
          cat > /tmp/.env.production <<'ENVEOF'
          # Auto-generated by GitHub Actions deploy workflow
          # Do not edit manually — update GitHub Secrets instead.

          # PostgreSQL (values used by docker-compose.prod.yml)
          POSTGRES_PASSWORD=${{ secrets.TRACKER_POSTGRES_PASSWORD }}

          # Database URL (overridden by compose, but needed for alembic inside container)
          DATABASE_URL=postgresql://tracker:${{ secrets.TRACKER_POSTGRES_PASSWORD }}@polymarket-tracker-postgres:5432/polymarket_tracker

          # Redis (overridden by compose to point at shared container)
          REDIS_URL=redis://${{ vars.REDIS_CONTAINER_NAME }}:6379

          # Polygon RPC
          POLYGON_RPC_URL=${{ secrets.TRACKER_POLYGON_RPC_URL }}
          POLYGON_FALLBACK_RPC_URL=${{ secrets.TRACKER_POLYGON_FALLBACK_RPC_URL }}

          # Polymarket API
          POLYMARKET_WS_URL=${{ vars.TRACKER_POLYMARKET_WS_URL || 'wss://ws-subscriptions-clob.polymarket.com/ws/market' }}

          # Alert Webhooks (optional — alerts disabled for any channel left blank)
          DISCORD_WEBHOOK_URL=${{ secrets.TRACKER_DISCORD_WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN=${{ secrets.TRACKER_TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID=${{ secrets.TRACKER_TELEGRAM_CHAT_ID }}

          # Application
          LOG_LEVEL=${{ vars.TRACKER_LOG_LEVEL || 'INFO' }}
          HEALTH_PORT=8080
          DRY_RUN=${{ vars.TRACKER_DRY_RUN || 'false' }}
          ENVEOF

          # Strip leading whitespace from heredoc indentation
          sed -i 's/^          //' /tmp/.env.production

          # Ensure VM directory exists
          ssh -p "${{ secrets.SERVER_PORT }}" "${{ env.SSH_TARGET }}" \
            "mkdir -p ${{ env.VM_APP_DIR }}/vars"

          scp -P "${{ secrets.SERVER_PORT }}" /tmp/.env.production \
            "${{ env.SSH_TARGET }}:${{ env.VM_APP_DIR }}/vars/.env.production"

          echo "Env file deployed."

      - name: Refresh GHCR credentials on VM
        run: |
          echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u "${{ github.repository_owner }}" --password-stdin
          ssh -p "${{ secrets.SERVER_PORT }}" "${{ env.SSH_TARGET }}" \
            "echo '${{ secrets.GHCR_PAT }}' | docker login ghcr.io -u '${{ github.repository_owner }}' --password-stdin"

      # -------------------------------------------------------------------
      # 3. Docker build setup
      # -------------------------------------------------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # -------------------------------------------------------------------
      # 4. Build and push image
      # -------------------------------------------------------------------
      - name: Short SHA
        id: sha
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=raw,value=${{ github.ref_name }}-${{ steps.sha.outputs.sha_short }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
          cache-to: type=inline

      # -------------------------------------------------------------------
      # 5. Deploy to VM via SSH
      # -------------------------------------------------------------------
      - name: Ensure VM directories exist
        run: |
          ssh -p "${{ secrets.SERVER_PORT }}" "${{ env.SSH_TARGET }}" \
            "mkdir -p ${{ env.VM_APP_DIR }}/scripts"

      - name: Sync deploy script to VM
        run: |
          scp -P "${{ secrets.SERVER_PORT }}" scripts/deploy-tracker.sh \
            "${{ env.SSH_TARGET }}:${{ env.VM_APP_DIR }}/scripts/deploy-tracker.sh"
          ssh -p "${{ secrets.SERVER_PORT }}" "${{ env.SSH_TARGET }}" \
            "sed -i 's/\r//' ${{ env.VM_APP_DIR }}/scripts/deploy-tracker.sh && chmod +x ${{ env.VM_APP_DIR }}/scripts/deploy-tracker.sh"

      - name: Sync docker-compose to VM
        run: |
          scp -P "${{ secrets.SERVER_PORT }}" docker-compose.prod.yml \
            "${{ env.SSH_TARGET }}:${{ env.VM_APP_DIR }}/docker-compose.prod.yml"

      - name: Deploy on VM
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}"
          ssh -p "${{ secrets.SERVER_PORT }}" "${{ env.SSH_TARGET }}" \
            "{ TRACKER_IMAGE='${IMAGE}' TRACKER_APP_DIR='${{ env.VM_APP_DIR }}' REDIS_CONTAINER='${{ vars.REDIS_CONTAINER_NAME }}' ${{ env.VM_APP_DIR }}/scripts/deploy-tracker.sh; } 2>&1"

      - name: Verify health
        run: |
          ssh -p "${{ secrets.SERVER_PORT }}" "${{ env.SSH_TARGET }}" "
            for i in \$(seq 1 24); do
              sleep 5
              if curl -sf http://localhost:8085/health > /dev/null 2>&1; then
                echo 'Health check passed (attempt '\$i')'
                exit 0
              fi
              echo 'Health check attempt '\$i'/24 ...'
            done
            echo 'ERROR: Health check failed after 120s'
            docker logs --tail=50 polymarket-tracker 2>&1 || true
            exit 1
          "
